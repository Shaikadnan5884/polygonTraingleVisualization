<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Polygon Triangulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        canvas { 
            background: white; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            cursor: crosshair; 
            display: block;
            margin: 0 auto;
        }
        .weight-input {
            width: 60px;
            padding: 2px 4px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Optimal Polygon Triangulation</h1>
        <p class="text-slate-500 mb-6 text-sm">Click the canvas to add vertices (in order), customize weights if desired, then click Calculate.</p>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: Canvas and Basic Controls -->
            <div class="lg:col-span-2">
                <div class="relative mb-6">
                    <canvas id="polyCanvas" width="500" height="400"></canvas>
                </div>

                <div class="flex gap-4 mb-8">
                    <button id="solveBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                        Calculate Triangulation
                    </button>
                    <button id="clearBtn" class="px-6 bg-slate-200 text-slate-700 py-3 rounded-lg font-semibold hover:bg-slate-300 transition">
                        Clear
                    </button>
                </div>
            </div>

            <!-- Right Side: Weight Configuration -->
            <div class="lg:col-span-1">
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 h-[400px] flex flex-col">
                    <h2 class="text-sm font-bold text-slate-700 uppercase mb-3 flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        Edge Weights
                    </h2>
                    <div id="weightsList" class="flex-1 overflow-y-auto space-y-2 pr-2">
                        <p class="text-xs text-slate-400 italic text-center py-10">Add vertices to define sides...</p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-200 text-[10px] text-slate-400">
                        Weights default to pixel distance. You can manually edit them here.
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsArea" class="hidden border-t pt-6">
            <h2 class="text-lg font-bold text-slate-800 mb-4">Results</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <p class="text-xs text-blue-600 font-bold uppercase">Minimum Cost</p>
                    <p id="totalCost" class="text-2xl font-mono font-bold text-blue-900">0.00</p>
                </div>
                <div class="bg-emerald-50 p-4 rounded-lg border border-emerald-100">
                    <p class="text-xs text-emerald-600 font-bold uppercase">Optimal Diagonals (Cuts)</p>
                    <ul id="diagonalsList" class="text-sm font-mono text-emerald-900 list-disc pl-4 mt-1">
                        <!-- List items added by JS -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('polyCanvas');
        const ctx = canvas.getContext('2d');
        const solveBtn = document.getElementById('solveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultsArea = document.getElementById('resultsArea');
        const totalCostEl = document.getElementById('totalCost');
        const diagonalsListEl = document.getElementById('diagonalsList');
        const weightsListEl = document.getElementById('weightsList');

        let points = [];
        let diagonals = [];
        let customWeights = {}; // Map of "i-j" strings to numeric weight

        function getPairKey(i, j) {
            return i < j ? `${i}-${j}` : `${j}-${i}`;
        }

        function dist(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        // Get weight from custom map or calculate from distance
        function getWeight(i, j) {
            const key = getPairKey(i, j);
            if (customWeights[key] !== undefined) return customWeights[key];
            return dist(points[i], points[j]);
        }

        // Weight of a triangle is the sum of its 3 sides
        function getTriangleWeight(i, j, k) {
            return getWeight(i, j) + getWeight(j, k) + getWeight(k, i);
        }

        function updateWeightsUI() {
            if (points.length < 2) {
                weightsListEl.innerHTML = '<p class="text-xs text-slate-400 italic text-center py-10">Add vertices to define sides...</p>';
                return;
            }

            weightsListEl.innerHTML = "";
            const n = points.length;
            
            // Show weights for all potential edges/diagonals (i to j where j > i)
            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    const key = getPairKey(i, j);
                    const isEdge = (j === i + 1) || (i === 0 && j === n - 1);
                    const currentWeight = getWeight(i, j).toFixed(1);

                    const div = document.createElement('div');
                    div.className = `flex items-center justify-between p-2 rounded ${isEdge ? 'bg-white shadow-sm border border-blue-100' : 'bg-slate-100'}`;
                    div.innerHTML = `
                        <span class="text-xs font-bold text-slate-600">${isEdge ? 'Side' : 'Diagonal'} (${i}, ${j})</span>
                        <input type="number" step="1" value="${currentWeight}" 
                               class="weight-input" 
                               onchange="window.updateManualWeight('${key}', this.value)">
                    `;
                    weightsListEl.appendChild(div);
                }
            }
        }

        window.updateManualWeight = (key, val) => {
            customWeights[key] = parseFloat(val);
            // Hide results if weights change to force recalculation
            resultsArea.classList.add('hidden');
            diagonals = [];
            draw();
        };

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            points.push({
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            });
            updateWeightsUI();
            draw();
        });

        clearBtn.addEventListener('click', () => {
            points = [];
            diagonals = [];
            customWeights = {};
            resultsArea.classList.add('hidden');
            updateWeightsUI();
            draw();
        });

        solveBtn.addEventListener('click', () => {
            const n = points.length;
            if (n < 3) return alert("Please add at least 3 points.");

            const table = Array.from({ length: n }, () => Array(n).fill(0));
            const split = Array.from({ length: n }, () => Array(n).fill(0));

            for (let L = 3; L <= n; L++) {
                for (let i = 0; i <= n - L; i++) {
                    let j = i + L - 1;
                    table[i][j] = Infinity;

                    for (let k = i + 1; k < j; k++) {
                        let cost = table[i][k] + table[k][j] + getTriangleWeight(i, j, k);
                        if (cost < table[i][j]) {
                            table[i][j] = cost;
                            split[i][j] = k;
                        }
                    }
                }
            }

            totalCostEl.textContent = table[0][n - 1].toFixed(2);
            diagonals = [];
            diagonalsListEl.innerHTML = "";
            findDiagonals(0, n - 1, split);
            
            if (diagonals.length === 0) {
                diagonalsListEl.innerHTML = "<li>None (Triangle)</li>";
            }
            
            resultsArea.classList.remove('hidden');
            draw();
        });

        function findDiagonals(i, j, split) {
            if (j <= i + 1) return;
            let k = split[i][j];
            checkAndAdd(i, k);
            checkAndAdd(k, j);
            if (i !== 0 || j !== points.length - 1) checkAndAdd(i, j);
            findDiagonals(i, k, split);
            findDiagonals(k, j, split);
        }

        function checkAndAdd(i, j) {
            const n = points.length;
            const isEdge = Math.abs(i - j) === 1 || (i === 0 && j === n - 1) || (j === 0 && i === n - 1);
            if (!isEdge) {
                const exists = diagonals.some(d => (d.i === i && d.j === j) || (d.i === j && d.j === i));
                if (!exists) {
                    diagonals.push({ i, j });
                    const li = document.createElement('li');
                    li.textContent = `Cut (${i} to ${j}) - W: ${getWeight(i, j).toFixed(1)}`;
                    diagonalsListEl.appendChild(li);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Optimal Cuts
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 2;
            diagonals.forEach(d => {
                ctx.beginPath();
                ctx.moveTo(points[d.i].x, points[d.i].y);
                ctx.lineTo(points[d.j].x, points[d.j].y);
                ctx.stroke();
            });
            ctx.setLineDash([]);

            // Draw Polygon
            if (points.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = '#2563eb';
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                if (points.length > 2) ctx.closePath();
                ctx.stroke();
            }

            // Draw Vertices
            points.forEach((p, index) => {
                ctx.fillStyle = '#2563eb';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1e293b';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText(index, p.x + 8, p.y - 8);
            });
        }
    </script>
</body>
</html>
